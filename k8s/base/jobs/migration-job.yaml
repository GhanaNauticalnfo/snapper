apiVersion: batch/v1
kind: Job
metadata:
  generateName: snapper-api-migrations-
spec:
  template:
    spec:
      containers:
      - name: migrations
        image: ghananauticalinfo/snapper-api:latest  # Will be patched in overlays
        command: ["/bin/sh", "-c"]
        args:
          - |
            cd /app
            echo "Running migrations for ${NODE_ENV} environment..."
            npm run migration:run
        env:
        - name: NODE_ENV
          value: "production"  # Will be patched in overlays
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: snapper-postgres-secret
              key: DATABASE_URL
      restartPolicy: Never
  backoffLimit: 3