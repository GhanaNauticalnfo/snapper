# Admin Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: snapper-admin-ingress
spec:
  tls:
  - hosts:
    - snapper-test-admin.ghananautical.info
    secretName: test-snapper-admin-tls
  rules:
  - host: snapper-test-admin.ghananautical.info
---
# API Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: snapper-api-ingress
spec:
  tls:
  - hosts:
    - snapper-test-api.ghananautical.info
    secretName: test-snapper-api-tls
  rules:
  - host: snapper-test-api.ghananautical.info
---
# Frontend Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: snapper-frontend-ingress
spec:
  tls:
  - hosts:
    - snapper-test.ghananautical.info
    secretName: test-snapper-tls
  rules:
  - host: snapper-test.ghananautical.info