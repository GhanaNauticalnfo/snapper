apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: test

resources:
  - ../../base/admin
  - ../../base/api
  - ../../base/frontend
  - ../../base/database

images:
  - name: ghananauticalinfo/snapper-admin
    newTag: test-develop
  - name: ghananauticalinfo/snapper-api
    newTag: test-develop
  - name: ghananauticalinfo/snapper-frontend
    newTag: test-develop

patches:
  - path: patches/ingress-hosts.yaml
  - path: patches/replicas.yaml
  - path: patches/database-resources.yaml
  - path: patches/node-env.yaml