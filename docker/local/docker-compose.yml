services:
  snapper-postgres:
    image: postgis/postgis:17-3.5-alpine
    container_name: snapper-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DATABASE_USER:-snapper_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-snapper_password}
      POSTGRES_DB: ${DATABASE_NAME:-postgres}
    volumes:
      - snapper-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - snapper-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-snapper_user} -d ${DATABASE_NAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  martin:
    image: ghcr.io/maplibre/martin:latest
    container_name: martin_tileserver
    depends_on:
      snapper-postgres:
        condition: service_healthy
    environment:
      # Connection string updated to match snapper-postgres credentials
      DATABASE_URL: postgresql://${DATABASE_USER:-snapper_user}:${DATABASE_PASSWORD:-snapper_password}@snapper-postgres:5432/${DATABASE_NAME:-postgres}
      # Optional: Set watch mode to auto-reload sources on schema changes (dev)
      # MARTIN_WATCH_MODE: true
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - snapper-network

networks:
  snapper-network:
    driver: bridge

volumes:
  snapper-postgres-data:
    driver: local