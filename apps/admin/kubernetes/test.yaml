apiVersion: apps/v1
kind: Deployment
metadata:
  name: snapper-admin
  namespace: test
  labels:
    app: snapper-admin
    env: test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: snapper-admin
      env: test
  template:
    metadata:
      labels:
        app: snapper-admin
        env: test
    spec:
      containers:
      - name: snapper-admin
        image: ghananauticalinfo/snapper-admin:test-develop
        imagePullPolicy: Always
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: snapper-admin-service
  namespace: test
spec:
  selector:
    app: snapper-admin
    env: test
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: snapper-admin-ingress
  namespace: test
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - snapper-test-admin.ghananautical.info
    secretName: test-snapper-admin-tls
  rules:
  - host: snapper-test-admin.ghananautical.info
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: snapper-admin-service
            port:
              number: 80