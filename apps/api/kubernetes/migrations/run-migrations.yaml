apiVersion: batch/v1
kind: Job
metadata:
  name: snapper-api-migrations-{TIMESTAMP}
  namespace: {ENVIRONMENT}  # Replace with: test or prod
spec:
  template:
    spec:
      containers:
      - name: migrations
        image: ghananauticalinfo/snapper-api:{ENVIRONMENT}-{BRANCH}  # Replace with actual image tag
        command: ["/bin/sh", "-c"]
        args:
          - |
            cd /app
            echo "Running migrations for ${NODE_ENV} environment..."
            npm run migration:run
        env:
        - name: NODE_ENV
          value: "{ENVIRONMENT}"  # Replace with actual environment 
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: snapper-postgres-secret
              key: DATABASE_URL
      restartPolicy: Never
  backoffLimit: 3