// Top-level build file where you can add configuration options common to all sub-projects/modules.

task printVSCodeJavaVersion { // Renamed for clarity
    group = "diagnostics" // Puts it in a nice group in VS Code's Gradle Tasks UI
    doLast {
        println "VSCode Gradle - Java version: ${System.getProperty('java.version')}"
        println "VSCode Gradle - Java home: ${System.getProperty('java.home')}"
        println "VSCode Gradle - Gradle version: ${project.getGradle().getGradleVersion()}"
    }
}

buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.10.0'
        classpath 'com.google.gms:google-services:4.4.2'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
